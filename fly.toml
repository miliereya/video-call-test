# fly.toml app configuration file generated for lovers-backend on 2026-05-17T17:44:19+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lovers-backend'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

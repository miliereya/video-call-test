services:
  - type: web
    name: lovers-backend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm install && npm run build --workspace=backend
    startCommand: npm run start:prod --workspace=backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USER_VIKA_PASSWORD
        sync: false
      - key: USER_DANIL_PASSWORD
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
